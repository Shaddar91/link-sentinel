<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{video_title}} — Video Summary</title>
<style>
{{css}}

/* --- Video summary overrides --- */

.video-url {
  font-size: 9pt;
  color: #1a5276;
  word-break: break-all;
}

.section-label {
  display: inline-block;
  font-size: 8pt;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #555;
  margin-bottom: 0.3em;
}
</style>
</head>
<body>

<div class="report-header">
  <h1>{{video_title}}</h1>
  <div class="report-meta">
    <span>Date: {{analysis_date}}</span>
    <span class="video-url">{{video_url}}</span>
  </div>
</div>

<div class="report-content">
{{content}}
</div>

</body>
</html>
